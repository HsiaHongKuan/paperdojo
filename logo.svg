<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <defs>
    <!-- Brain gradient -->
    <radialGradient id="brainGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="70%" stop-color="#c44569"/>
      <stop offset="100%" stop-color="#8e2451"/>
    </radialGradient>
    <!-- Paper gradient -->
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#dee2e6"/>
    </linearGradient>
    <!-- Sword gradient -->
    <linearGradient id="swordBlade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <!-- Agent glow -->
    <radialGradient id="agentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Background circle gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="300" cy="280" r="240" fill="url(#bgGrad)" stroke="#2a2a4a" stroke-width="3"/>

  <!-- Subtle circular dojo ring -->
  <circle cx="300" cy="280" r="210" fill="none" stroke="#c44569" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.4"/>
  <circle cx="300" cy="280" r="220" fill="none" stroke="#00d2ff" stroke-width="1" stroke-dasharray="4 8" opacity="0.3"/>

  <!-- === PAPER (enemy, right side) === -->
  <g transform="translate(370, 180) rotate(12)" filter="url(#shadow)">
    <!-- Paper body -->
    <rect x="0" y="0" width="100" height="130" rx="3" fill="url(#paperGrad)" stroke="#adb5bd" stroke-width="1.5"/>
    <!-- Folded corner -->
    <path d="M75 0 L100 0 L100 25 Z" fill="#c8ccd0"/>
    <path d="M75 0 L75 25 L100 25" fill="none" stroke="#adb5bd" stroke-width="1"/>
    <!-- Text lines on paper -->
    <line x1="15" y1="25" x2="70" y2="25" stroke="#868e96" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="38" x2="80" y2="38" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="48" x2="65" y2="48" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="58" x2="78" y2="58" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="68" x2="55" y2="68" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="78" x2="75" y2="78" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="88" x2="60" y2="88" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="98" x2="72" y2="98" stroke="#adb5bd" stroke-width="2" stroke-linecap="round"/>
    <!-- Angry paper eyes -->
    <g transform="translate(0, -8)">
      <ellipse cx="35" cy="50" rx="8" ry="6" fill="#343a40"/>
      <ellipse cx="65" cy="48" rx="8" ry="6" fill="#343a40"/>
      <ellipse cx="37" cy="49" rx="3" ry="3" fill="#ff6b6b"/>
      <ellipse cx="67" cy="47" rx="3" ry="3" fill="#ff6b6b"/>
      <!-- Angry eyebrows -->
      <line x1="25" y1="38" x2="42" y2="42" stroke="#343a40" stroke-width="3" stroke-linecap="round"/>
      <line x1="75" y1="36" x2="58" y2="40" stroke="#343a40" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Paper arms (fists up) -->
    <path d="M-5 70 Q-20 55 -15 45" stroke="#adb5bd" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="-15" cy="43" r="5" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>
    <path d="M105 65 Q120 50 115 40" stroke="#adb5bd" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="115" cy="38" r="5" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>
  </g>

  <!-- === ACTION LINES (battle effect) === -->
  <g opacity="0.5">
    <line x1="310" y1="220" x2="350" y2="210" stroke="#ffcc00" stroke-width="2" stroke-linecap="round"/>
    <line x1="315" y1="250" x2="355" y2="245" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="305" y1="280" x2="340" y2="280" stroke="#ffcc00" stroke-width="2" stroke-linecap="round"/>
    <!-- Impact sparks -->
    <polygon points="335,235 340,225 345,237 352,230 342,240 350,245 335,240" fill="#ffcc00" opacity="0.7"/>
  </g>

  <!-- === BRAIN (hero, left-center) === -->
  <g transform="translate(180, 190)" filter="url(#shadow)">
    <!-- Brain shape -->
    <path d="
      M60 10
      C30 5, 5 25, 10 55
      C12 70, 5 90, 20 110
      C30 130, 50 135, 65 130
      C75 140, 95 135, 105 120
      C120 110, 125 90, 118 75
      C130 55, 120 25, 95 15
      C80 0, 65 5, 60 10Z
    " fill="url(#brainGrad)" stroke="#8e2451" stroke-width="2"/>
    <!-- Brain folds/wrinkles -->
    <path d="M60 15 C55 40, 65 60, 60 85 C58 100, 62 115, 65 130" fill="none" stroke="#8e2451" stroke-width="2.5" opacity="0.6"/>
    <path d="M25 45 C40 50, 55 45, 60 50" fill="none" stroke="#8e2451" stroke-width="2" opacity="0.5"/>
    <path d="M65 45 C80 40, 100 50, 115 45" fill="none" stroke="#8e2451" stroke-width="2" opacity="0.5"/>
    <path d="M20 75 C35 80, 50 70, 60 78" fill="none" stroke="#8e2451" stroke-width="2" opacity="0.5"/>
    <path d="M65 75 C80 70, 100 80, 115 72" fill="none" stroke="#8e2451" stroke-width="2" opacity="0.5"/>
    <path d="M30 100 C45 95, 55 105, 60 100" fill="none" stroke="#8e2451" stroke-width="2" opacity="0.5"/>
    <path d="M65 98 C80 105, 95 95, 105 105" fill="none" stroke="#8e2451" stroke-width="2" opacity="0.5"/>

    <!-- Determined eyes -->
    <ellipse cx="40" cy="65" rx="10" ry="8" fill="white"/>
    <ellipse cx="85" cy="65" rx="10" ry="8" fill="white"/>
    <ellipse cx="43" cy="65" rx="5" ry="5" fill="#1a1a2e"/>
    <ellipse cx="88" cy="65" rx="5" ry="5" fill="#1a1a2e"/>
    <ellipse cx="44" cy="64" rx="2" ry="2" fill="white"/>
    <ellipse cx="89" cy="64" rx="2" ry="2" fill="white"/>
    <!-- Determined eyebrows -->
    <line x1="28" y1="52" x2="50" y2="54" stroke="#5c1433" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="96" y1="52" x2="75" y2="54" stroke="#5c1433" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Grin -->
    <path d="M45 82 Q62 95 82 82" fill="none" stroke="#5c1433" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- === KATANA SWORD (held by brain) === -->
  <g transform="translate(240, 140) rotate(-35)" filter="url(#glow)">
    <!-- Blade -->
    <path d="M0 0 L6 -120 L3 -130 L-6 -120 Z" fill="url(#swordBlade)" stroke="#999" stroke-width="0.8"/>
    <!-- Blade shine -->
    <line x1="2" y1="-10" x2="4" y2="-110" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <!-- Tsuba (guard) -->
    <ellipse cx="0" cy="5" rx="14" ry="5" fill="#8B7355" stroke="#5c4a32" stroke-width="1.5"/>
    <!-- Handle wrap -->
    <rect x="-5" y="8" width="10" height="45" rx="3" fill="#2d1810"/>
    <line x1="-4" y1="14" x2="4" y2="18" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="-4" y1="22" x2="4" y2="26" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="-4" y1="30" x2="4" y2="34" stroke="#8B7355" stroke-width="1.5"/>
    <line x1="-4" y1="38" x2="4" y2="42" stroke="#8B7355" stroke-width="1.5"/>
    <!-- Pommel -->
    <ellipse cx="0" cy="55" rx="6" ry="3" fill="#8B7355" stroke="#5c4a32" stroke-width="1"/>
  </g>

  <!-- === AI AGENT (small companion) === -->
  <g transform="translate(130, 310)">
    <!-- Agent glow aura -->
    <circle cx="0" cy="0" r="35" fill="url(#agentGlow)" filter="url(#softGlow)"/>
    <!-- Agent body (small floating bot) -->
    <rect x="-20" y="-18" width="40" height="32" rx="8" fill="#0f3460" stroke="#00d2ff" stroke-width="2"/>
    <!-- Agent eye/visor -->
    <rect x="-14" y="-10" width="28" height="10" rx="4" fill="#00d2ff" opacity="0.9"/>
    <circle cx="-5" cy="-5" r="3" fill="white"/>
    <circle cx="8" cy="-5" r="3" fill="white"/>
    <!-- Agent antenna -->
    <line x1="0" y1="-18" x2="0" y2="-28" stroke="#00d2ff" stroke-width="2"/>
    <circle cx="0" cy="-30" r="4" fill="#00d2ff" filter="url(#glow)"/>
    <!-- Small helper arms -->
    <path d="M-20 -2 Q-35 -10 -30 -22" stroke="#00d2ff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M20 -2 Q35 5 38 -5" stroke="#00d2ff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Tiny spark from agent (assisting) -->
    <circle cx="-32" cy="-24" r="3" fill="#00d2ff" opacity="0.7" filter="url(#glow)"/>
    <circle cx="40" cy="-7" r="2.5" fill="#00d2ff" opacity="0.7" filter="url(#glow)"/>
    <!-- "AI" text on body -->
    <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#00d2ff">AI</text>
  </g>

  <!-- === ENERGY CONNECTION (agent to brain) === -->
  <path d="M155 300 Q175 270 200 280" stroke="#00d2ff" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6" filter="url(#glow)"/>
  <path d="M148 295 Q165 260 195 270" stroke="#00d2ff" stroke-width="1" fill="none" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- Decorative Japanese-style corner marks -->
  <g opacity="0.3" stroke="#c44569" stroke-width="2" fill="none">
    <path d="M80 60 L80 45 L95 45"/>
    <path d="M520 60 L520 45 L505 45"/>
    <path d="M80 505 L80 520 L95 520"/>
    <path d="M520 505 L520 520 L505 520"/>
  </g>
</svg>